spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:scriba_test}
    username: ${DB_USERNAME:scriba_user}
    password: ${DB_PASSWORD:scriba_test_pass}
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  thymeleaf:
    prefix: classpath:/templates/app_beta/
    suffix: .html
    cache: false # Opcional: útil para ver mudanças sem reiniciar o app em dev

scriba:
  tenant:
    strict-mode: true

