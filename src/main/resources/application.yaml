spring:
  application:
    name: scriba
  aop:
    proxy-target-class: false
  mvc:
    problemdetails:
      enabled: true
  thymeleaf:
    cache: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

scriba:
  tenant:
    strict-mode: true
  mail:
    from: ${MAIL_FROM:no-reply@scriba.dev}
  notificacoes:
    atrasos-cron: ${NOTIFICACOES_ATRASOS_CRON:0 0 8 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health, info
