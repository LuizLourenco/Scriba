<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <h1>Categorias</h1>
    <p th:if="${sucesso}" th:text="${sucesso}"></p>
    <form method="get" th:action="@{/catalogo/categorias}">
        <input name="busca" th:value="${busca}" placeholder="Buscar por nome">
        <button type="submit">Buscar</button>
    </form>
    <p><a th:href="@{/catalogo/categorias/nova}">Nova categoria</a></p>
    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Pai</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="categoria : ${categorias}">
            <td th:text="${categoria.nome}"></td>
            <td th:text="${categoria.pai != null ? categoria.pai.nome : '-'}"></td>
            <td th:text="${categoria.ativo ? 'Ativa' : 'Inativa'}"></td>
            <td><a th:href="@{/catalogo/categorias/{id}/editar(id=${categoria.id})}">Editar</a></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
