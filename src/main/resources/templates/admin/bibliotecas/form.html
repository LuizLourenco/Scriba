<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <h1 th:text="${bibliotecaId == null ? 'Nova biblioteca' : 'Editar biblioteca'}"></h1>
    <form method="post" th:action="${bibliotecaId == null ? '/admin/bibliotecas' : '/admin/bibliotecas/' + bibliotecaId}" th:object="${bibliotecaForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></p>
        </div>
        <label for="nome">Nome</label>
        <input id="nome" th:field="*{nome}">
        <p th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>

        <label for="codigo">Código</label>
        <input id="codigo" th:field="*{codigo}">
        <p th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></p>

        <label>
            <input type="checkbox" th:field="*{ativo}">
            Ativa
        </label>

        <button type="submit">Salvar</button>
        <a th:href="@{/admin/bibliotecas}">Cancelar</a>
    </form>
</main>
</body>
</html>
