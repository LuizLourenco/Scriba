<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: app('Bibliotecas', ~{::main})}">
<main>
    <h1>Bibliotecas</h1>
    <p class="message-success" th:if="${sucesso}" th:text="${sucesso}"></p>
    <p><a th:href="@{/admin/bibliotecas/nova}">Nova biblioteca</a></p>
    <table th:fragment="tabela">
        <thead>
        <tr>
            <th>Nome</th>
            <th>Código</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="biblioteca : ${bibliotecas}">
            <td th:text="${biblioteca.nome}"></td>
            <td th:text="${biblioteca.codigo}"></td>
            <td th:text="${biblioteca.ativo ? 'Ativa' : 'Inativa'}"></td>
            <td>
                <a th:href="@{/admin/bibliotecas/{id}/editar(id=${biblioteca.id})}">Editar</a>
                <form th:if="${biblioteca.ativo}" method="post" th:action="@{/admin/bibliotecas/{id}/desativar(id=${biblioteca.id})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">Desativar</button>
                </form>
                <form th:unless="${biblioteca.ativo}" method="post" th:action="@{/admin/bibliotecas/{id}/ativar(id=${biblioteca.id})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">Ativar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</html>
