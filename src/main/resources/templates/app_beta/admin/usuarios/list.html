<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <h1>Usuários</h1>
    <p th:if="${sucesso}" th:text="${sucesso}"></p>
    <p><a th:href="@{/admin/usuarios/novo}">Novo usuário</a></p>
    <table th:fragment="tabela">
        <thead>
        <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Perfil</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.nome}"></td>
            <td th:text="${usuario.email}"></td>
            <td th:text="${usuario.role}"></td>
            <td th:text="${usuario.ativo ? 'Ativo' : 'Inativo'}"></td>
            <td>
                <a th:href="@{/admin/usuarios/{id}/editar(id=${usuario.id})}">Editar</a>
                <form th:if="${usuario.ativo}" method="post" th:action="@{/admin/usuarios/{id}/desativar(id=${usuario.id})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">Desativar</button>
                </form>
                <form th:unless="${usuario.ativo}" method="post" th:action="@{/admin/usuarios/{id}/ativar(id=${usuario.id})}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">Ativar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
