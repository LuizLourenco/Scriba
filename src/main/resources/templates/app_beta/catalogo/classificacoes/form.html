<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: app(${classificacaoId == null ? 'Nova classificação' : 'Editar classificação'}, ~{::main})}">
<main>
    <h1 th:text="${classificacaoId == null ? 'Nova classificação' : 'Editar classificação'}"></h1>
    <form method="post" th:action="${classificacaoId == null ? '/catalogo/classificacoes' : '/catalogo/classificacoes/' + classificacaoId}" th:object="${classificacaoForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></p>
        </div>
        <label for="padrao">Padrão</label>
        <select id="padrao" th:field="*{padrao}">
            <option th:each="padrao : ${padroes}" th:value="${padrao}" th:text="${padrao}"></option>
        </select>

        <label for="codigo">Código</label>
        <input id="codigo" th:field="*{codigo}">

        <label for="descricao">Descrição</label>
        <input id="descricao" th:field="*{descricao}">

        <label>
            <input type="checkbox" th:field="*{ativo}">
            Ativa
        </label>
        <button type="submit">Salvar</button>
        <a th:href="@{/catalogo/classificacoes}">Cancelar</a>
    </form>
</main>
</html>
