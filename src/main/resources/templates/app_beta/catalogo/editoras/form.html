<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: app(${editoraId == null ? 'Nova editora' : 'Editar editora'}, ~{::main})}">
<main>
    <h1 th:text="${editoraId == null ? 'Nova editora' : 'Editar editora'}"></h1>
    <form method="post" th:action="${editoraId == null ? '/catalogo/editoras' : '/catalogo/editoras/' + editoraId}" th:object="${editoraForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></p>
        </div>
        <label for="nome">Nome</label>
        <input id="nome" th:field="*{nome}">

        <label for="cidade">Cidade</label>
        <input id="cidade" th:field="*{cidade}">

        <label for="pais">País</label>
        <input id="pais" th:field="*{pais}">

        <label>
            <input type="checkbox" th:field="*{ativo}">
            Ativa
        </label>
        <button type="submit">Salvar</button>
        <a th:href="@{/catalogo/editoras}">Cancelar</a>
    </form>
</main>
</html>
