<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: app(${autorId == null ? 'Novo autor' : 'Editar autor'}, ~{::main})}">
<main>
    <h1 th:text="${autorId == null ? 'Novo autor' : 'Editar autor'}"></h1>
    <form method="post" th:action="${autorId == null ? '/catalogo/autores' : '/catalogo/autores/' + autorId}" th:object="${autorForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></p>
        </div>
        <label for="nome">Nome</label>
        <input id="nome" th:field="*{nome}">
        <p th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>

        <label for="nacionalidade">Nacionalidade</label>
        <input id="nacionalidade" th:field="*{nacionalidade}">

        <label for="biografia">Biografia</label>
        <textarea id="biografia" th:field="*{biografia}"></textarea>

        <label>
            <input type="checkbox" th:field="*{ativo}">
            Ativo
        </label>
        <button type="submit">Salvar</button>
        <a th:href="@{/catalogo/autores}">Cancelar</a>
    </form>
</main>
</html>
