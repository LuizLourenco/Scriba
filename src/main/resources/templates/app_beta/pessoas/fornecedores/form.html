<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<main>
    <h1 th:text="${fornecedorId == null ? 'Novo fornecedor' : 'Editar fornecedor'}"></h1>
    <form method="post" th:action="${fornecedorId == null ? '/pessoas/fornecedores' : '/pessoas/fornecedores/' + fornecedorId}" th:object="${fornecedorForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></p>
        </div>
        <label for="nome">Nome</label>
        <input id="nome" th:field="*{nome}">

        <label for="tipo">Tipo</label>
        <select id="tipo" th:field="*{tipo}">
            <option th:each="tipo : ${tiposFornecedor}" th:value="${tipo}" th:text="${tipo}"></option>
        </select>

        <label for="cpfCnpj">CPF/CNPJ</label>
        <input id="cpfCnpj" th:field="*{cpfCnpj}">

        <label for="email">E-mail</label>
        <input id="email" type="email" th:field="*{email}">

        <label for="telefone">Telefone</label>
        <input id="telefone" th:field="*{telefone}">

        <label>
            <input type="checkbox" th:field="*{ativo}">
            Ativo
        </label>
        <button type="submit">Salvar</button>
        <a th:href="@{/pessoas/fornecedores}">Cancelar</a>
    </form>
</main>
</body>
</html>
